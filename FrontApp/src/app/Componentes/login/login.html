<div class="body">
    <mat-card class="loginCard">
        <div class="header">
            <h1>Iniciar Sesión</h1>
        </div>

        <mat-card-content style="padding-bottom: 15px;">
            <form [formGroup]="formLogin" (ngSubmit)="iniciarSesion()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Correo</mat-label>
                    <input formControlName="email" type="email" required autocomplete="off" matInput>
                    <mat-icon matSuffix>mail</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <input [type]="ocultarPassword ? 'password' : 'text'" 
                    formControlName="password" type="password" required autocomplete="off" matInput>
                  
                    <button mat-icon-button matSuffix
                    (click)="ocultarPassword=!ocultarPassword"
                    type="button">
                    <mat-icon matSuffix>{{ ocultarPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                </mat-form-field>

                <button mat-raised-button color="primary" 
                class="full-width" type="submit"
                [disabled]="formLogin.invalid">
                <mat-icon matSuffix>login</mat-icon>
                Iniciar Sesión</button>
            </form>
        </mat-card-content>
        <mat-card-footer>
            <mat-progress-bar *ngIf="mostrarLoading" mode="indeterminate">
                
            </mat-progress-bar>
        </mat-card-footer>
    </mat-card>
</div>
